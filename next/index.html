<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Apex Akina — 3D</title>
    <link rel="stylesheet" href="styles.css">
    <script type="importmap">
      {
        "imports": {
          "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
          "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
      }
    </script>
  </head>
  <body>
    <main class="shell">
      <section class="game-frame" aria-label="Apex Akina 3D">
        <canvas id="game"></canvas>
        <div class="hud" aria-live="polite">
          <div class="hud-stack">
            <span class="label">Speed</span>
            <strong id="speed">0</strong><small> km/h</small>
          </div>
          <div class="hud-stack">
            <span class="label">Lap</span>
            <strong id="lap">1/3</strong>
          </div>
          <div class="hud-stack">
            <span class="label">Pos</span>
            <strong id="place">9th</strong>
          </div>
          <div class="hud-stack">
            <span class="label">Time</span>
            <strong id="time">0:00.00</strong>
          </div>
          <div class="hud-stack">
            <span class="label">Best</span>
            <strong id="best">—</strong>
          </div>
          <div class="hud-stack boost-wrap">
            <span class="label">Boost</span>
            <div class="boost-meter" aria-hidden="true"><span id="boost-bar"></span></div>
          </div>
          <button id="mute-btn" class="back-link" type="button" aria-pressed="false">♪</button>
          <a class="back-link" href="../index.html">← Old engine</a>
        </div>
        <aside class="leaderboard" id="leaderboard">
          <span class="label">Order</span>
          <ol id="standings"></ol>
        </aside>

        <div class="overlay" id="title-overlay">
          <div class="title-card">
            <p class="eyebrow">Apex Akina &middot; 3D engine</p>
            <h1>Pick your track</h1>
            <p>WASD or arrows to drive. Shift to boost. Space to drift. 8 AI rivals on a 3-lap closed loop.</p>
            <div class="track-picker" id="track-picker" role="radiogroup" aria-label="Choose track"></div>
            <button id="start" type="button">Drop In</button>
          </div>
        </div>

        <canvas class="minimap" id="minimap" width="180" height="120"></canvas>

        <div class="overlay" id="finish-overlay" hidden>
          <div class="title-card">
            <p class="eyebrow">Race complete</p>
            <h1 id="finish-title">Finished</h1>
            <p id="finish-stats"></p>
            <button id="restart" type="button">Run It Back</button>
          </div>
        </div>
      </section>
    </main>
    <script type="module" src="main.js"></script>
  </body>
</html>
