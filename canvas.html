<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Apex Akina</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="shell">
      <section class="game-frame" aria-label="Apex Akina racing game">
        <canvas id="game" width="960" height="540"></canvas>

        <div class="hud" aria-live="polite">
          <div class="hud-stack">
            <span class="label">Lap</span>
            <strong id="lap">1/3</strong>
          </div>
          <div class="hud-stack">
            <span class="label">Pos</span>
            <strong id="place">4th</strong>
          </div>
          <div class="hud-stack speed">
            <span class="label">Speed</span>
            <strong><span id="speed">0</span><small> km/h</small></strong>
          </div>
          <div class="hud-stack timer">
            <span class="label">Time</span>
            <strong id="time">0:00.00</strong>
          </div>
          <div class="hud-stack">
            <span class="label">Gear</span>
            <strong id="gear">N</strong>
          </div>
          <div class="boost-wrap">
            <span class="label">Boost</span>
            <div class="boost-meter" aria-hidden="true">
              <span id="boost"></span>
            </div>
            <span class="label engine-label">Engine</span>
            <div class="boost-meter engine-meter" aria-hidden="true">
              <span id="engine-bar"></span>
            </div>
          </div>
          <div class="hud-stack combo-stack" id="combo-stack" hidden>
            <span class="label">Combo</span>
            <strong id="combo-value">x1</strong>
          </div>
          <button id="start" type="button">
            <span>Start Race</span>
          </button>
          <button id="touch-toggle" type="button" class="touch-toggle" aria-pressed="false" title="Toggle touch controls">
            <span aria-hidden="true">⊞</span>
          </button>
          <button id="mute-toggle" type="button" class="touch-toggle" aria-pressed="false" title="Toggle sound">
            <span aria-hidden="true">♪</span>
          </button>
        </div>

        <div class="title-card" id="title-card">
          <header class="title-card__head">
            <span class="eyebrow">Pre-race</span>
            <span class="title-card__hint">Pick a track and your machine. Hit Start when you're ready.</span>
          </header>
          <div class="track-picker" id="track-picker" role="radiogroup" aria-label="Choose track"></div>
          <div class="car-picker" id="car-picker" role="radiogroup" aria-label="Choose your car"></div>
          <footer class="title-card__actions">
            <span class="title-card__pb" id="title-card-pb"></span>
            <button type="button" id="start-prerace" class="prerace-btn">Start Race</button>
          </footer>
        </div>

        <div class="race-callout" id="race-callout" aria-live="polite"></div>

        <aside class="leaderboard" aria-label="Race order">
          <span class="label">Order</span>
          <ol id="leaderboard"></ol>
        </aside>

        <div class="finish-panel" id="finish-panel" hidden>
          <p class="eyebrow">Race complete</p>
          <h2 id="finish-title">Clean Run</h2>
          <p id="finish-stats"></p>
          <button id="restart" type="button">Run It Back</button>
        </div>

        <div class="touch-controls" id="touch-controls" hidden>
          <div class="touch-pad touch-pad--left">
            <button class="touch-btn" data-key="ArrowLeft" aria-label="Steer left">◀</button>
            <button class="touch-btn" data-key="ArrowRight" aria-label="Steer right">▶</button>
          </div>
          <div class="touch-pad touch-pad--right">
            <button class="touch-btn touch-btn--brake" data-key="ArrowDown" aria-label="Brake">BRK</button>
            <button class="touch-btn touch-btn--drift" data-key="Space" aria-label="Drift">DRIFT</button>
            <button class="touch-btn touch-btn--gas" data-key="ArrowUp" aria-label="Throttle">GAS</button>
          </div>
        </div>
      </section>
    </main>

    <script src="game.js"></script>
  </body>
</html>
